version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comap-network # The DB stays private to the comap internal network

  server:
    build:
      context: ./comap_server
      dockerfile: Dockerfile
    user: "${APPWASDI_UID:-1000}:${APPWASDI_GID:-1000}"
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - COPERNICUS_DATASPACE_USERNAME=${COPERNICUS_DATASPACE_USERNAME}
      - COPERNICUS_DATASPACE_PASSWORD=${COPERNICUS_DATASPACE_PASSWORD}
      - COPERNICUS_DATASPACE_ACCESS_TOKEN=${COPERNICUS_DATASPACE_ACCESS_TOKEN}
      - COMAP_PROJECTS_BASE_PATH=${COMAP_PROJECTS_BASE_PATH}
    volumes:
      - ./comap_server:/app
      - /opt/comap/docker/data:${COMAP_PROJECTS_BASE_PATH}
    networks:
      - comap-network
      - net-wasdi # Joins Traefik's world
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net-wasdi"
      # Route API requests to backend: comap.wasdi.net/api/*
      - "traefik.http.routers.comap-server.rule=Host(`comap.wasdi.net`) && PathPrefix(`/api`)"
      - "traefik.http.routers.comap-server.entrypoints=websecure"
      - "traefik.http.routers.comap-server.tls=true"
      - "traefik.http.routers.comap-server.priority=2"
      - "traefik.http.services.comap-server.loadbalancer.server.port=8000"
      # Strip /api prefix before sending to FastAPI
      - "traefik.http.middlewares.comap-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.comap-server.middlewares=comap-strip-api"

  client:
    build:
      context: ./comap_app
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
        - REACT_APP_MAPBOX_TOKEN=${REACT_APP_MAPBOX_TOKEN}
    depends_on:
      - server
    networks:
      - comap-network
      - net-wasdi # Joins Traefik's world
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net-wasdi"
      # Route frontend requests (excluding /api/*) to client
      - "traefik.http.routers.comap-client.rule=Host(`comap.wasdi.net`)"
      - "traefik.http.routers.comap-client.entrypoints=websecure"
      - "traefik.http.routers.comap-client.tls=true"
      - "traefik.http.routers.comap-client.priority=1"
      - "traefik.http.services.comap-client.loadbalancer.server.port=80"

volumes:
  postgres_data:
    driver: local

networks:
  comap-network:
    driver: bridge
  net-wasdi:
    external: true