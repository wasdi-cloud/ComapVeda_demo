version: '3.8'
services:
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comap-network

  server:
    build:
      context: ./comap_server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./comap_server:/app
    networks:
      - comap-network
    restart: unless-stopped

  client:
    build:
      context: ./comap_app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - comap-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  comap-network:
    driver: bridge
